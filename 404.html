<!DOCTYPE html>
<html>
<head>
  <script>
    const oldBase = '/Diplomas_OTEC_CP'
    const path = window.location.pathname

    if (path.startsWith(oldBase)) {
      const newPath = path.slice(oldBase.length) || '/'
      window.location.replace(
        'https://otec.sapa.cl' + newPath + window.location.search + window.location.hash
      )
    } else {
      window.location.replace('https://otec.sapa.cl')
    }
  </script>
</head>
<body></body>
</html>
